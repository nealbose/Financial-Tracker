{% extends 'base.html' %}

{% block title %}Add Transaction - Financial Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Add New Transaction</h1>
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="type">Type *</label>
            <select id="type" name="type" required>
                <option value="">Select type...</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="form-group">
            <label for="category">Category *</label>
            <input type="text" id="category" name="category" placeholder="e.g., Groceries, Salary, Utilities" required>
        </div>

        <div class="form-group">
            <label for="amount">Amount *</label>
            <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0" required>
        </div>

        <div class="form-group">
            <label for="date">Date *</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Optional notes about this transaction"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Transaction</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
